<!DOCTYPE html>

<html lang="es">

<head>

    ```
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Escape Room JS
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- SweetAlert2 -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CSS -->

    <link rel="stylesheet" href="./assets/css/styles.css">
    ```

</head>

<body>

    ```
    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">

        <div class="sidebar-header">

            <div class="logo-box">

                <i class="bi bi-cpu-fill"></i>

            </div>

            <div>

                <h3 class="logo-title">
                    Escape Room JS
                </h3>

                <small>
                    Cámara de los 5 desafíos
                </small>

            </div>

        </div>

        <nav class="sidebar-menu">

            <button class="menu-link" data-page="nivel1">
                <i class="bi bi-geo-alt-fill"></i>
                <span>Nivel 1</span>
            </button>

            <button class="menu-link" data-page="nivel2">
                <i class="bi bi-map-fill"></i>
                <span>Nivel 2</span>
            </button>

            <button class="menu-link" data-page="nivel3">
                <i class="bi bi-camera-fill"></i>
                <span>Nivel 3</span>
            </button>

            <button class="menu-link" data-page="nivel4">
                <i class="bi bi-cpu"></i>
                <span>Nivel 4</span>
            </button>

            <button class="menu-link" data-page="nivel5">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <span>Nivel 5</span>
            </button>

        </nav>

    </aside>

    <!-- MAIN -->

    <main class="main-content" id="mainContent">

        <!-- TOPBAR -->

        <header class="topbar">

            <div class="topbar-left">

                <button id="toggleSidebar" class="toggle-btn">
                    <i class="bi bi-list"></i>
                </button>

                <div>

                    <h2 id="pageTitle">
                        Nivel 1 - El Guardián de la Ubicación
                    </h2>

                    <small id="systemStatus">
                        Sistema bloqueado
                    </small>

                </div>

            </div>

            <div class="topbar-right">

                <button id="btnRestore" class="btn btn-outline-warning">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    Restaurar
                </button>

                <div class="clock-box">

                    <i class="bi bi-clock-fill"></i>

                    <span id="clock">
                        00:00:00
                    </span>

                </div>

            </div>

        </header>

        <!-- PROGRESO GLOBAL -->

        <section class="progress-section">

            <div class="d-flex justify-content-between mb-2">

                <span>
                    Recuperación del sistema
                </span>

                <span id="globalPercent">
                    0%
                </span>

            </div>

            <div class="progress">

                <div id="globalProgress" class="progress-bar" style="width:0%"></div>

            </div>

        </section>

        <!-- CONTENIDO DINÁMICO -->

        <section id="content" class="page-content"></section>

    </main>

    <!-- APP -->

    <script type="module" src="./assets/js/app.js"></script>
    ```

</body>

</html>
